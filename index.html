<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivina el Número 🌅</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b);
      color: #fff;
      padding: 20px;
    }

    .game-card {
      background: rgba(45, 22, 50, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 209, 102, 0.4);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: border-color 0.5s, box-shadow 0.5s;
    }

    h1 {
      color: #ffd166;
      font-size: 1.8rem;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      color: #ffe8d6;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 100px;
      text-align: center;
      border: 2px solid rgba(255, 111, 97, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    input:focus {
      border-color: #ff6f61;
      box-shadow: 0 0 12px rgba(255, 111, 97, 0.5);
    }
    /* Ocultar flechas del input numérico */
    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    button {
      padding: 12px 24px;
      font-size: 18px;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.3s;
    }
    button:hover {
      background-color: #ff5a4d;
      transform: translateY(-2px);
    }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #mensaje {
      font-size: 24px;
      margin: 20px 0;
      min-height: 40px;
      transition: font-size 0.3s;
    }

    #contador {
      color: #ffe8d6;
      font-size: 15px;
    }

    #mejorPuntaje {
      color: #ffd166;
      font-size: 14px;
      margin-top: 4px;
    }

    #historial {
      margin-top: 16px;
      font-size: 14px;
      color: #ffe8d6;
    }

    #btnReiniciar {
      background-color: #d35400;
      margin-top: 12px;
    }
    #btnReiniciar:hover {
      background-color: #b8410f;
    }

    @media (max-width: 480px) {
      .game-card { padding: 30px 20px; }
      .controls { flex-direction: column; align-items: center; }
      input { width: 80%; }
      button { width: 80%; }
    }
  </style>
</head>
<body>
  <div class="game-card" id="game-card">
    <h1>🌅 Adivina el Número</h1>
    <p class="subtitle">Estoy pensando en un número del 1 al 100...</p>

    <div class="controls">
      <input type="number" id="inputIntento" min="1" max="100" placeholder="?">
      <button id="btnAdivinar">Adivinar</button>
    </div>

    <p id="mensaje"></p>
    <p id="contador">Intentos: 0 / 10</p>
    <p id="mejorPuntaje">Mejor puntaje: -</p>
    <p id="historial">Historial: </p>

    <button id="btnReiniciar" style="display: none;">
      🔄 Jugar de nuevo
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
